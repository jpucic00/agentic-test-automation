# Central locator registry — legacy pattern: page objects resolve these keys at
# runtime via Locators.byKey(...). Values starting with "//" are XPath; anything
# else is an element id. No page-object source ever contains these values, so a
# static reading of the Java can never recover them.
notes.delete.confirm=//div[contains(@class,'modal')]//div[contains(@class,'btn') and normalize-space()='Delete']
nav.logout=//nav//div[contains(@class,'btn') and normalize-space()='Log out']
